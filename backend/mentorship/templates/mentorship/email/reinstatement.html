<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #10B981; color: white; padding: 20px; border-radius: 8px 8px 0 0; text-align: center; }
        .content { background: #f9fafb; padding: 20px; border-radius: 0 0 8px 8px; }
        .button {
            display: inline-block;
            padding: 12px 24px;
            background: #10B981;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
        }
        .checkmark { font-size: 48px; text-align: center; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="checkmark">✅</div>
            <h2>Account Reinstated</h2>
        </div>
        <div class="content">
            <p>Hi <strong>{{ mentor.title }}</strong>,</p>
            <p>Good news! Your mentor account has been <strong>reinstated</strong> after review.</p>
            <p>You can now continue accepting bookings and providing mentorship services.</p>

            <p style="text-align: center; margin-top: 30px;">
                <a href="{{ dashboard_url }}" class="button">Go to Dashboard</a>
            </p>

            <p style="margin-top: 30px; color: #666; font-size: 14px;">
                Best regards,<br>
                The PathAI Team
            </p>
        </div>
    </div>
</body>
</html>
